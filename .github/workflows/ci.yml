name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Restore dependencies
        run: |
          dotnet restore backend/Backend.csproj
          dotnet restore backend.Tests/Backend.Tests.csproj

      - name: Build
        run: dotnet build backend.Tests/Backend.Tests.csproj -c Release --no-restore

      - name: Test
        run: dotnet test backend.Tests/Backend.Tests.csproj -c Release --no-build --verbosity normal

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build
        run: npm run build

  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Build images
        run: docker compose build
